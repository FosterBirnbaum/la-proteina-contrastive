# Flow model trained on pdb_small latents from the BASELINE VAE.
# Use this for the first pipeline-validation run and for the baseline side
# of the baseline-vs-contrastive comparison.
#
# autoencoder_ckpt_path must point to the baseline VAE checkpoint.
# Update this to the best-step checkpoint from your baseline_small run.
# The path is resolved relative to the project root (where you run python from).

run_name_: flow_baseline_small

hardware:
  ncpus_per_task_train_: 12
  ncpus_per_task_prepro_: 32
  accelerator: gpu
  ngpus_per_node_: 1
  nnodes_: 1

defaults:
  - dataset: pdb/pdb_train_ucond_small
  - nn: local_latents_score_nn_20M
  - generation: validation_local_latents
  - _self_

# Path to the frozen VAE encoder used to compute latents on-the-fly.
# The autoencoder parameters are frozen; only the flow model (nn) is trained.
# Update this path to your actual baseline VAE checkpoint.
autoencoder_ckpt_path: store/laproteina_ae_baseline/lightning_logs/version_3/checkpoints/epoch=203-step=330000.ckpt

pretrain_ckpt_path:

product_flowmatcher:
  bb_ca:
    zero_com_noise: True
    guidance_enabled: True
    dim: 3
  local_latents:
    zero_com_noise: False
    guidance_enabled: True
    dim: null  # overwritten from autoencoder.latent_dim at runtime

loss:
  t_distribution:
    bb_ca:
      name: mix_unif_beta
      p1: 1.9
      p2: 1.0
      p3: 0.02
    local_latents:
      name: mix_unif_beta
      p1: 1.0
      p2: 1.5
      p3: 0.2
    shared_groups:

force_precision_f32: False

training:
  n_recycle: 0
  motif_conditioning: False
  self_cond: True
  p_folding_n_inv_folding_iters: 0.1

lora:
  r: null
  lora_alpha: 32.0
  lora_dropout: 0.0
  train_bias: none

opt:
  lr: 0.0001
  max_epochs: 10000000
  accumulate_grad_batches: 4   # effective batch = 8×4 = 32
  skip_nan_grad: False
  grad_and_weight_analysis: False
  dist_strategy: ddp
  val_check_interval: 5000

log:
  wandb_project: laproteina
  log_wandb: False
  log_every_n_steps: 10
  checkpoint: True
  checkpoint_every_n_steps: 10000
  last_ckpt_every_n_steps: 1500

seed: 42

ema:
  decay: 0.999
  validate_original_weights: False
  every_n_steps: 1
  cpu_offload: False
